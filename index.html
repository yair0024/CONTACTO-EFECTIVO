<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas de Cobertura · Contacto Efectivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:   #0b1a2e;
  --navy2:  #122040;
  --gold:   #c9a94b;
  --gold-l: #e2c97a;
  --gold-d: #8a6e28;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Barlow',sans-serif; background:var(--navy); color:#fff; overflow:hidden; }

header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  height:70px;
  background:linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
  border-bottom:1.5px solid var(--gold-d);
  display:flex; align-items:center; gap:14px; padding:0 24px;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.logo-img {
  width:52px; height:52px; border-radius:10px;
  border:1.5px solid var(--gold-d);
  object-fit:cover; object-position:center top;
  flex-shrink:0; background:#000;
}
.brand h1 { font-family:'Playfair Display',serif; font-size:1.25rem; line-height:1.1; }
.brand h1 em { color:var(--gold); font-style:normal; }
.brand p { font-size:.68rem; font-weight:300; letter-spacing:.14em; text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:2px; }
.header-right { margin-left:auto; display:flex; align-items:center; gap:12px; }
.zone-count {
  background:rgba(201,169,75,.12); border:1px solid var(--gold-d);
  color:var(--gold-l); padding:5px 14px; border-radius:20px;
  font-size:.72rem; font-weight:500; letter-spacing:.08em; text-transform:uppercase;
}
.website-link { color:rgba(255,255,255,.5); font-size:.72rem; text-decoration:none; transition:color .2s; }
.website-link:hover { color:var(--gold-l); }

#map { position:fixed; top:70px; left:0; right:0; bottom:0; z-index:1; }

#sidebar {
  position:fixed; top:70px; right:0; bottom:0; width:240px; z-index:500;
  background:linear-gradient(180deg, rgba(11,26,46,.97) 0%, rgba(18,32,64,.97) 100%);
  border-left:1.5px solid rgba(201,169,75,.2);
  display:flex; flex-direction:column;
  backdrop-filter:blur(8px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { transform:translateX(100%); }

.sidebar-header {
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(201,169,75,.15);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header span { font-size:.7rem; font-weight:500; letter-spacing:.14em; text-transform:uppercase; color:var(--gold); }
.sidebar-toggle-btn { background:none; border:none; cursor:pointer; color:rgba(255,255,255,.5); font-size:1rem; padding:2px 4px; transition:color .2s; }
.sidebar-toggle-btn:hover { color:#fff; }

#zone-list { flex:1; overflow-y:auto; padding:10px 0; }
#zone-list::-webkit-scrollbar { width:4px; }
#zone-list::-webkit-scrollbar-thumb { background:rgba(201,169,75,.3); border-radius:2px; }

.zone-item { display:flex; align-items:center; gap:10px; padding:8px 18px; cursor:pointer; transition:background .2s; }
.zone-item:hover { background:rgba(201,169,75,.08); }
.zone-item.active { background:rgba(201,169,75,.15); }
.zone-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; border:1.5px solid rgba(255,255,255,.2); }
.zone-name { font-size:.78rem; font-weight:400; color:rgba(255,255,255,.8); white-space:nowrap; overflow:hidden; text-overflow:ellipsis; }

.sidebar-footer { padding:12px 18px; font-size:.67rem; color:rgba(255,255,255,.3); border-top:1px solid rgba(201,169,75,.1); text-align:center; line-height:1.5; }

#open-sidebar-btn {
  position:fixed; top:80px; right:0; z-index:600;
  background:rgba(11,26,46,.95); border:1.5px solid var(--gold-d);
  color:var(--gold-l); padding:8px 14px;
  font-family:'Barlow',sans-serif; font-size:.75rem; font-weight:500; letter-spacing:.06em;
  cursor:pointer; border-radius:8px 0 0 8px;
  box-shadow:-4px 4px 16px rgba(0,0,0,.4);
  display:none; transition:background .2s;
}
#open-sidebar-btn.visible { display:block; }
#open-sidebar-btn:hover { background:rgba(18,32,64,.99); }

.leaflet-popup-content-wrapper {
  background:rgba(11,26,46,.97) !important;
  border:1px solid var(--gold-d) !important;
  border-radius:10px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.5) !important;
  color:#fff !important;
}
.leaflet-popup-tip { background:rgba(11,26,46,.97) !important; }
.popup-label { font-size:.65rem; font-weight:500; letter-spacing:.12em; text-transform:uppercase; color:var(--gold); margin-bottom:4px; }
.popup-zone-name { font-size:.95rem; font-weight:600; }
</style>
</head>

const PALETTE = [
  '#e63946','#2a9d8f','#e9c46a','#6a4c93','#f4a261',
  '#43aa8b','#f72585','#4361ee','#fb8500','#06d6a0',
  '#ef233c','#8338ec','#3a86ff','#ffbe0b','#52b788',
  '#d62828','#023e8a','#80b918','#f77f00','#48cae4',
  '#e76f51','#457b9d','#a8dadc','#f1c453','#90be6d'
];

let activeItem = null;
const allBounds = [];

ZONES.forEach((zone, i) => {
  const color = PALETTE[i % PALETTE.length];
  zone.polygons.forEach(poly => {
    const layer = L.polygon(poly, {
      color, weight:2.2, opacity:.9, fillColor:color, fillOpacity:.22
    }).addTo(map);

    layer.bindPopup(
      '<div class="popup-label">Zona de entrega</div>' +
      '<div class="popup-zone-name">' + zone.name + '</div>'
    );
    allBounds.push(...poly);

    const list = document.getElementById('zone-list');
    const item = document.createElement('div');
    item.className = 'zone-item';
    item.innerHTML = '<div class="zone-dot" style="background:' + color + '"></div><div class="zone-name">' + zone.name + '</div>';
    item.addEventListener('click', () => {
      if (activeItem) activeItem.classList.remove('active');
      activeItem = item;
      item.classList.add('active');
      map.fitBounds(layer.getBounds(), { padding:[60,60] });
      layer.openPopup();
    });
    list.appendChild(item);
  });
});

if (allBounds.length) map.fitBounds(L.latLngBounds(allBounds), { padding:[30,30] });
document.getElementById('zone-count-badge').textContent = ZONES.length + ' zonas de cobertura';

document.getElementById('collapse-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('open-sidebar-btn').classList.add('visible');
  map.invalidateSize();
});
document.getElementById('open-sidebar-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('open-sidebar-btn').classList.remove('visible');
  map.invalidateSize();
});
</script>
