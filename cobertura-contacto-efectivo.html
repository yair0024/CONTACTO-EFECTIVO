<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Zonas de Cobertura · Contacto Efectivo</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@700&family=Barlow:ital,wght@0,300;0,400;0,500;0,600;1,300&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css"/>
<script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
<style>
:root {
  --navy:      #0b1a2e;
  --navy2:     #122040;
  --gold:      #c9a94b;
  --gold-l:    #e2c97a;
  --gold-d:    #8a6e28;
  --cream:     #f5f0e8;
  --white:     #ffffff;
}
* { margin:0; padding:0; box-sizing:border-box; }
html, body { height:100%; font-family:'Barlow',sans-serif; background:var(--navy); color:var(--white); overflow:hidden; }

/* ── HEADER ── */
header {
  position:fixed; top:0; left:0; right:0; z-index:1000;
  height:70px;
  background:linear-gradient(90deg, var(--navy) 0%, var(--navy2) 100%);
  border-bottom:1.5px solid var(--gold-d);
  display:flex; align-items:center; gap:16px; padding:0 24px;
  box-shadow:0 4px 30px rgba(0,0,0,0.5);
}
.logo-img {
  width:52px; height:52px; border-radius:10px;
  border:1.5px solid var(--gold-d);
  object-fit:cover; flex-shrink:0;
}
.brand h1 {
  font-family:'Playfair Display',serif;
  font-size:1.25rem; line-height:1.1;
  color:var(--white);
}
.brand h1 em { color:var(--gold); font-style:normal; }
.brand p {
  font-size:0.68rem; font-weight:300; letter-spacing:.14em;
  text-transform:uppercase; color:rgba(255,255,255,.45); margin-top:2px;
}
.header-right {
  margin-left:auto; display:flex; align-items:center; gap:12px;
}
.zone-count {
  background:rgba(201,169,75,.12); border:1px solid var(--gold-d);
  color:var(--gold-l); padding:5px 14px; border-radius:20px;
  font-size:0.72rem; font-weight:500; letter-spacing:.08em;
  text-transform:uppercase; white-space:nowrap;
  transition:all .3s;
}
.website-link {
  color:rgba(255,255,255,.5); font-size:0.72rem; font-weight:300;
  text-decoration:none; letter-spacing:.04em;
  transition:color .2s;
}
.website-link:hover { color:var(--gold-l); }

/* ── MAP ── */
#map {
  position:fixed; top:70px; left:0; right:0; bottom:0;
  z-index:1;
}

/* ── SIDEBAR (legend + zones) ── */
#sidebar {
  position:fixed; top:70px; right:0; bottom:0;
  width:240px; z-index:500;
  background:linear-gradient(180deg, rgba(11,26,46,.97) 0%, rgba(18,32,64,.97) 100%);
  border-left:1.5px solid rgba(201,169,75,.2);
  display:flex; flex-direction:column;
  backdrop-filter:blur(8px);
  transition:transform .35s cubic-bezier(.4,0,.2,1);
}
#sidebar.collapsed { transform:translateX(100%); }

.sidebar-header {
  padding:16px 18px 12px;
  border-bottom:1px solid rgba(201,169,75,.15);
  display:flex; align-items:center; justify-content:space-between;
}
.sidebar-header span {
  font-size:.7rem; font-weight:500; letter-spacing:.14em;
  text-transform:uppercase; color:var(--gold);
}
.sidebar-toggle-btn {
  background:none; border:none; cursor:pointer;
  color:rgba(255,255,255,.5); font-size:1rem; line-height:1;
  padding:2px 4px; transition:color .2s;
}
.sidebar-toggle-btn:hover { color:var(--white); }

#zone-list {
  flex:1; overflow-y:auto; padding:10px 0;
}
#zone-list::-webkit-scrollbar { width:4px; }
#zone-list::-webkit-scrollbar-track { background:transparent; }
#zone-list::-webkit-scrollbar-thumb { background:var(--gold-d); border-radius:2px; }

.zone-item {
  display:flex; align-items:center; gap:10px;
  padding:9px 18px; cursor:pointer;
  transition:background .2s;
  border-left:3px solid transparent;
}
.zone-item:hover { background:rgba(255,255,255,.05); }
.zone-item.active {
  background:rgba(201,169,75,.1);
  border-left-color:var(--gold);
}
.zone-dot {
  width:14px; height:14px; border-radius:3px;
  flex-shrink:0; opacity:.85;
}
.zone-name {
  font-size:.8rem; font-weight:400; line-height:1.3;
  color:rgba(255,255,255,.85);
}
.zone-item.active .zone-name { color:var(--white); font-weight:500; }

.sidebar-footer {
  padding:14px 18px;
  border-top:1px solid rgba(201,169,75,.12);
  font-size:.66rem; color:rgba(255,255,255,.3);
  line-height:1.5; text-align:center;
}

/* ── FLOAT TOGGLE (when sidebar collapsed) ── */
#open-sidebar-btn {
  position:fixed; top:82px; right:0; z-index:600;
  background:var(--navy2); border:1.5px solid var(--gold-d);
  border-right:none; color:var(--gold-l);
  padding:8px 10px; border-radius:8px 0 0 8px;
  cursor:pointer; font-size:.8rem;
  display:none; align-items:center; gap:6px;
  font-family:'Barlow',sans-serif; font-weight:500;
  box-shadow:-4px 4px 18px rgba(0,0,0,.3);
  transition:background .2s;
}
#open-sidebar-btn:hover { background:rgba(201,169,75,.12); }
#open-sidebar-btn.visible { display:flex; }

/* ── KML UPLOAD PANEL ── */
#upload-panel {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%);
  z-index:700; background:rgba(11,26,46,.96);
  border:1.5px solid var(--gold-d); border-radius:14px;
  padding:18px 26px; backdrop-filter:blur(12px);
  box-shadow:0 8px 40px rgba(0,0,0,.5);
  display:flex; flex-direction:column; align-items:center; gap:10px;
  min-width:320px; max-width:90vw;
  transition:opacity .4s, transform .4s;
}
#upload-panel.hidden {
  opacity:0; pointer-events:none; transform:translateX(-50%) translateY(20px);
}
.upload-title {
  font-family:'Playfair Display',serif;
  font-size:1rem; color:var(--gold-l); text-align:center;
}
.upload-sub {
  font-size:.72rem; color:rgba(255,255,255,.45); text-align:center;
  font-weight:300; line-height:1.5; max-width:260px;
}
.upload-row {
  display:flex; gap:10px; align-items:center; flex-wrap:wrap; justify-content:center;
}
.btn-upload {
  background:linear-gradient(135deg, var(--gold-d), var(--gold));
  color:var(--navy); border:none; padding:9px 22px;
  border-radius:8px; font-family:'Barlow',sans-serif;
  font-weight:600; font-size:.8rem; letter-spacing:.06em;
  cursor:pointer; transition:filter .2s, transform .15s;
}
.btn-upload:hover { filter:brightness(1.1); transform:translateY(-1px); }
.btn-demo {
  background:transparent; color:rgba(255,255,255,.55);
  border:1px solid rgba(255,255,255,.2); padding:9px 18px;
  border-radius:8px; font-family:'Barlow',sans-serif;
  font-size:.78rem; cursor:pointer; transition:all .2s;
}
.btn-demo:hover { border-color:var(--gold-d); color:var(--gold-l); }
#kml-file-input { display:none; }

/* ── POPUP override ── */
.leaflet-popup-content-wrapper {
  background:var(--navy2) !important;
  border:1.5px solid var(--gold-d) !important;
  border-radius:10px !important;
  box-shadow:0 8px 32px rgba(0,0,0,.5) !important;
  color:var(--white) !important;
}
.leaflet-popup-tip { background:var(--navy2) !important; }
.popup-zone-name {
  font-family:'Playfair Display',serif;
  font-size:1rem; color:var(--gold-l); margin-bottom:4px;
}
.popup-label {
  font-size:.72rem; color:rgba(255,255,255,.45);
  font-weight:300; letter-spacing:.06em; text-transform:uppercase;
}

/* ── ATTRIBUTION ── */
.leaflet-control-attribution {
  background:rgba(11,26,46,.8) !important;
  color:rgba(255,255,255,.3) !important;
  font-size:.6rem !important;
}
.leaflet-control-attribution a { color:rgba(201,169,75,.6) !important; }

/* ── RESPONSIVE ── */
@media (max-width:600px) {
  #sidebar { width:200px; }
  .brand h1 { font-size:1rem; }
  #upload-panel { bottom:16px; padding:14px 18px; }
}
</style>
</head>

<script>
// ── MAP INIT ─────────────────────────────────────────────────────
const map = L.map('map', {
  center: [20.65, -103.35],
  zoom: 10,
  zoomControl: true,
});

// Tiles tipo Google Maps (OpenStreetMap base)
L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
  attribution: '© OpenStreetMap contributors',
  maxZoom: 19,
}).addTo(map);

// Opcional: tiles más limpios tipo Google Maps
const cartoTiles = L.tileLayer('https://{s}.basemaps.cartocdn.com/rastertiles/voyager/{z}/{x}/{y}{r}.png', {
  attribution: '© OpenStreetMap © CARTO',
  maxZoom: 19,
});
cartoTiles.addTo(map);

// ── PALETTE ──────────────────────────────────────────────────────
const PALETTE = [
  '#e63946','#2a9d8f','#e9c46a','#264653','#f4a261',
  '#6a4c93','#43aa8b','#f72585','#4361ee','#fb8500',
  '#06d6a0','#ef233c','#8338ec','#3a86ff','#ffbe0b',
  '#52b788','#d62828','#023e8a','#80b918','#f77f00',
];

let zoneIndex = 0;
const allLayers = [];
let activeItem = null;

function getColor(i) { return PALETTE[i % PALETTE.length]; }

// ── SIDEBAR HELPERS ───────────────────────────────────────────────
function addZoneToSidebar(name, color, layer) {
  const list = document.getElementById('zone-list');
  const item = document.createElement('div');
  item.className = 'zone-item';
  item.innerHTML =
    '<div class="zone-dot" style="background:' + color + '"></div>' +
    '<div class="zone-name">' + (name || 'Zona sin nombre') + '</div>';

  item.addEventListener('click', () => {
    if (activeItem) activeItem.classList.remove('active');
    activeItem = item;
    item.classList.add('active');
    map.fitBounds(layer.getBounds(), { padding: [40, 40] });
    layer.openPopup();
  });

  list.appendChild(item);
  return item;
}

function updateBadge(n) {
  const badge = document.getElementById('zone-count-badge');
  badge.textContent = n === 0 ? 'Sin zonas' : n + ' zona' + (n !== 1 ? 's' : '');
}

// ── KML PARSER ────────────────────────────────────────────────────
function parseKML(kmlText) {
  const parser = new DOMParser();
  const doc = parser.parseFromString(kmlText, 'application/xml');

  // Clear previous
  allLayers.forEach(l => map.removeLayer(l));
  allLayers.length = 0;
  document.getElementById('zone-list').innerHTML = '';
  activeItem = null;
  zoneIndex = 0;

  const placemarks = doc.querySelectorAll('Placemark');
  if (placemarks.length === 0) {
    alert('No se encontraron polígonos en el KML. Verifica el archivo.');
    return;
  }

  const bounds = [];

  placemarks.forEach(pm => {
    const nameEl = pm.querySelector('name');
    const name = nameEl ? nameEl.textContent.trim() : ('Zona ' + (zoneIndex + 1));

    // Try Polygon
    const polygons = pm.querySelectorAll('Polygon');
    polygons.forEach(poly => {
      const coords = extractCoords(poly.querySelector('coordinates'));
      if (!coords.length) return;
      const color = getColor(zoneIndex++);
      const layer = L.polygon(coords, {
        color: color,
        weight: 2.5,
        opacity: 0.95,
        fillColor: color,
        fillOpacity: 0.22,
      }).addTo(map);

      layer.bindPopup(
        '<div class="popup-label">Zona de entrega</div>' +
        '<div class="popup-zone-name">' + name + '</div>'
      );
      layer.on('click', () => {
        const items = document.querySelectorAll('.zone-item');
        items.forEach(i => i.classList.remove('active'));
      });

      allLayers.push(layer);
      const sideItem = addZoneToSidebar(name, color, layer);
      bounds.push(...coords);
    });

    // Try MultiGeometry
    const multis = pm.querySelectorAll('MultiGeometry Polygon');
    if (polygons.length === 0 && multis.length > 0) {
      const color = getColor(zoneIndex++);
      multis.forEach(poly => {
        const coords = extractCoords(poly.querySelector('coordinates'));
        if (!coords.length) return;
        const layer = L.polygon(coords, {
          color, weight: 2.5, opacity: .95, fillColor: color, fillOpacity: .22
        }).addTo(map);
        layer.bindPopup(
          '<div class="popup-label">Zona de entrega</div>' +
          '<div class="popup-zone-name">' + name + '</div>'
        );
        allLayers.push(layer);
        addZoneToSidebar(name, color, layer);
        bounds.push(...coords);
      });
    }
  });

  if (bounds.length) {
    map.fitBounds(L.latLngBounds(bounds), { padding: [30, 30] });
  }

  updateBadge(zoneIndex);
  hidePanelAfterLoad();
}

function extractCoords(coordsEl) {
  if (!coordsEl) return [];
  return coordsEl.textContent.trim().split(/\s+/).map(c => {
    const parts = c.split(',');
    if (parts.length < 2) return null;
    const lng = parseFloat(parts[0]);
    const lat = parseFloat(parts[1]);
    if (isNaN(lat) || isNaN(lng)) return null;
    return [lat, lng];
  }).filter(Boolean);
}

// ── FILE INPUT ────────────────────────────────────────────────────
document.getElementById('kml-file-input').addEventListener('change', function(e) {
  const file = e.target.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = ev => parseKML(ev.target.result);
  reader.readAsText(file);
  this.value = '';
});

// ── DRAG & DROP ───────────────────────────────────────────────────
document.body.addEventListener('dragover', e => { e.preventDefault(); });
document.body.addEventListener('drop', e => {
  e.preventDefault();
  const file = e.dataTransfer.files[0];
  if (file && (file.name.endsWith('.kml') || file.name.endsWith('.xml'))) {
    const reader = new FileReader();
    reader.onload = ev => parseKML(ev.target.result);
    reader.readAsText(file);
  }
});

// ── PANEL HIDE ────────────────────────────────────────────────────
function hidePanelAfterLoad() {
  document.getElementById('upload-panel').classList.add('hidden');
  // show upload again via small button
  if (!document.getElementById('reload-btn')) {
    const btn = document.createElement('button');
    btn.id = 'reload-btn';
    btn.title = 'Cargar nuevo KML';
    btn.textContent = '📂';
    btn.style.cssText = 'position:fixed;bottom:24px;left:24px;z-index:700;' +
      'background:rgba(11,26,46,.9);border:1.5px solid #8a6e28;color:#e2c97a;' +
      'width:42px;height:42px;border-radius:50%;font-size:1.1rem;cursor:pointer;' +
      'box-shadow:0 4px 18px rgba(0,0,0,.4);transition:transform .2s;';
    btn.addEventListener('mouseover', () => btn.style.transform = 'scale(1.1)');
    btn.addEventListener('mouseout',  () => btn.style.transform = 'scale(1)');
    btn.addEventListener('click', () => {
      document.getElementById('upload-panel').classList.remove('hidden');
    });
    document.body.appendChild(btn);
  }
}

// ── SIDEBAR COLLAPSE ──────────────────────────────────────────────
document.getElementById('collapse-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.add('collapsed');
  document.getElementById('open-sidebar-btn').classList.add('visible');
  map.invalidateSize();
});
document.getElementById('open-sidebar-btn').addEventListener('click', () => {
  document.getElementById('sidebar').classList.remove('collapsed');
  document.getElementById('open-sidebar-btn').classList.remove('visible');
  map.invalidateSize();
});

// ── INIT ──────────────────────────────────────────────────────────
updateBadge(0);
</script>
